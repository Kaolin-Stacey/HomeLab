services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    hostname: syncthing

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ${DOCKER_ROOT}/syncthing/config:/config
      - /srv/data/syncthing/saves:/saves
      - /srv/data/syncthing/roms:/roms

    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp

    restart: unless-stopped

    networks:
      - proxy_net

networks:
  proxy_net:
    external: true