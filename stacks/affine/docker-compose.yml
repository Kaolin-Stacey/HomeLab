name: affine

networks:
  affine_net:
    driver: bridge
  proxy_net:
    external: true

services:
  postgres:
    image: postgres:16
    container_name: affine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: affine
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: ${AFFINE_DB_PASSWORD}
    volumes:
      - ${DOCKER_ROOT}/affine/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - affine_net

  redis:
    image: redis:7-alpine
    container_name: affine_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${DOCKER_ROOT}/affine/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - affine_net

  affine_migration:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine_migration
    restart: "no"
    command:
      - sh
      - -c
      - node ./scripts/self-host-predeploy.js
    environment:
      NODE_ENV: production
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://affine:${AFFINE_DB_PASSWORD}@postgres:5432/affine
      AFFINE_INDEXER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${DOCKER_ROOT}/affine/config:/root/.affine/config
      - ${DOCKER_ROOT}/affine/storage:/root/.affine/storage
    networks:
      - affine_net

  affine:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_SERVER_HOST: redis
      DATABASE_URL: postgresql://affine:${AFFINE_DB_PASSWORD}@postgres:5432/affine
      AFFINE_INDEXER_ENABLED: "false"
      AFFINE_SERVER_HTTPS: "true"
      AFFINE_SERVER_EXTERNAL_URL: ${AFFINE_SERVER_EXTERNAL_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
    volumes:
      - ${DOCKER_ROOT}/affine/config:/root/.affine/config
      - ${DOCKER_ROOT}/affine/storage:/root/.affine/storage
    ports:
      - "3010:3010"
    networks:
      - affine_net
      - proxy_net