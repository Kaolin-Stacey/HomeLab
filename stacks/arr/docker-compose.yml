networks:
  media_net:
    external: true
  proxy_net:
    external: true

services:
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_ROOT}/arr/prowlarr:/config
    networks:
      - media_net
      - proxy_net
    restart: unless-stopped

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ${DOCKER_ROOT}/arr/radarr:/config
      - ${MEDIA}:/media
      - ${DOWNLOADS}:/downloads
    networks:
      - media_net
      - proxy_net
    restart: unless-stopped

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ${DOCKER_ROOT}/arr/sonarr:/config
      - ${MEDIA}:/media
      - ${DOWNLOADS}:/downloads
    ports:
      - "192.168.3.5:8989:8989"
    networks:
      - media_net
      - proxy_net
    restart: unless-stopped

  mylar3:
    image: ghcr.io/linuxserver/mylar3:latest
    container_name: mylar3
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_ROOT}/arr/mylar3:/config
      - ${MEDIA}/manga:/manga
      - ${DOWNLOADS}:/downloads
    networks:
      - media_net
      - proxy_net
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    ports:
      - "127.0.0.1:8191:8191"
    networks:
      - media_net
    restart: unless-stopped