networks:
  media_net:
    external: true
  proxy_net:
    external: true

services:
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./prowlarr:/config
    networks:
      - media_net
      - proxy_net
    restart: unless-stopped
    env_file:
      - ../../.env

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ./radarr:/config
      - /media/plex:/media
      - ${DOWNLOADS}:/downloads
    networks:
      - media_net
      - proxy_net
    restart: unless-stopped
    env_file:
      - ../../.env

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ./sonarr:/config
      - /media/plex:/media
      - ${DOWNLOADS}:/downloads
    networks:
      - media_net
      - proxy_net
    restart: unless-stopped
    env_file:
      - ../../.env

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    networks:
      - media_net
      - proxy_net
    restart: unless-stopped
    env_file:
      - ../../.env