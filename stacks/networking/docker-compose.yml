networks:
  proxy_net:
    external: true

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"   # NPM admin UI
    environment:
      - TZ=${TZ}
    volumes:
      - ${DOCKER_ROOT}/npm/data:/data
      - ${DOCKER_ROOT}/npm/letsencrypt:/etc/letsencrypt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy_net
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
          - "53:53/tcp"
          - "53:53/udp"
          - "8082:80/tcp" # Pi-hole admin interface
    environment:
      TZ: ${TZ}
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
      DNS1: 1.1.1.1
      DNS2: 9.9.9.9
    volumes:
      - ${DOCKER_ROOT}/pihole/etc-pihole:/etc/pihole
      - ${DOCKER_ROOT}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    networks:
      - proxy_net