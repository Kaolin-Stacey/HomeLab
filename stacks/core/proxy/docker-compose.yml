name: npm

networks:
  proxy_net:
    external: true

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"   # NPM admin UI
    environment:
      - TZ=${TZ}
    volumes:
      - ${DOCKER_ROOT}/npm/data:/data
      - ${DOCKER_ROOT}/npm/letsencrypt:/etc/letsencrypt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy_net