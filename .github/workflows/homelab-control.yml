name: Homelab Control

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack path, example: media/automation"
        required: true
        default: "media/automation"
      action:
        description: "Compose action"
        required: true
        default: "up"
        type: choice
        options:
          - up
          - down
          - restart
          - pull
          - logs
      allow_core:
        description: "Allow core stacks"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  control:
    runs-on: self-hosted

    steps:
      - name: Update repo
        run: |
          cd /srv/homelab-repo
          git fetch origin
          git pull --ff-only origin main

      - name: Deploy repo files
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            /srv/homelab-repo/ /srv/homelab/

          chmod +x /srv/homelab/scripts/*.sh

      - name: Run stack action
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_VAULT_NAME: "Your Vault Name"
          OP_ITEM_NAME: "Docker Compose Secrets"
          ALLOW_CORE: ${{ github.event.inputs.allow_core }}
        run: |
          /srv/homelab/scripts/compose-stack.sh \
            "${{ github.event.inputs.stack }}" \
            "${{ github.event.inputs.action }}"