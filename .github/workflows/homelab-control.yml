name: Homelab Control

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack path, example: media/automation"
        required: true
        default: "media/automation"

      all_stacks:
        description: "Run against all non-core stacks"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      action:
        description: "Compose action"
        required: true
        default: "up"
        type: choice
        options:
          - up
          - down
          - restart
          - pull
          - logs

      allow_core:
        description: "Allow core stacks"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  control:
    runs-on: self-hosted

    steps:
      - name: Update repo and sync runtime
        run: |
          /srv/homelab-repo/scripts/update-repo.sh

      - name: Run compose action
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_VAULT_NAME: "HomeLab"
          OP_ITEM_NAME: "Docker Compose Secrets"
          ALLOW_CORE: ${{ github.event.inputs.allow_core }}
        run: |
          if [[ "${{ github.event.inputs.all_stacks }}" == "true" ]]; then
            /srv/homelab/scripts/compose-all.sh \
              "${{ github.event.inputs.action }}"
          else
            /srv/homelab/scripts/compose-stack.sh \
              "${{ github.event.inputs.stack }}" \
              "${{ github.event.inputs.action }}"
          fi