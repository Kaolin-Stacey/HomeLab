name: Homelab Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Sync repo to origin/main
        shell: bash
        run: |
          set -euo pipefail
          cd /srv/homelab
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Deploy changed stacks
        shell: bash
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          /usr/local/bin/homelab/compose-changed.sh "$BEFORE_SHA" "$AFTER_SHA"