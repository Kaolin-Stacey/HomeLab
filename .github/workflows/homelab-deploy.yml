name: Deploy Homelab Repo

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Update repo
        run: |
          cd /srv/HomeLab
          git fetch origin
          git pull --ff-only origin main
      - name: Run deploy script
        run: /srv/HomeLab/scripts/deploy-repo.sh