name: Deploy Homelab Repo

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Export secrets
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          /srv/homelab/scripts/export-secrets.sh
      - name: Update repo
        run: |
          cd /srv/homelab
          git fetch origin
          git pull --ff-only origin main
      - name: Run deploy script
        run: /srv/homelab/scripts/deploy-repo.sh