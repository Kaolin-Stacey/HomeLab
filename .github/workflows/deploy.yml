name: Deploy homelab

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Sync repo to origin/main
        shell: bash
        run: |
          set -euo pipefail
          cd /srv/homelab
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Deploy stacks
        shell: bash
        env:
          CAPTCHA_SOLVER: ${{ secrets.CAPTCHA_SOLVER }}
          PIHOLE_WEBPASSWORD: ${{ secrets.PIHOLE_WEBPASSWORD }}
          MUMBLE_SERVER_PASSWORD: ${{ secrets.MUMBLE_SERVER_PASSWORD }}
          MUMBLE_SUPERUSER_PASSWORD: ${{ secrets.MUMBLE_SUPERUSER_PASSWORD }}

          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}

        run: |
          set -euo pipefail
          /usr/local/bin/homelab/compose-with-secrets.sh up