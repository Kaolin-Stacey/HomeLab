name: Deploy homelab

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Sync repo to origin/main
        shell: bash
        run: |
          set -euo pipefail
          cd /srv/homelab
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Write env files from GitHub Secrets
        shell: bash
        run: |
          set -euo pipefail
          umask 077

          # Global env
          ENV_PATH="/srv/homelab/.env"
          echo "DOCKER_ROOT=${{ secrets.DOCKER_ROOT }}" > "$ENV_PATH"
          echo "DOWNLOADS=${{ secrets.DOWNLOADS }}" >> "$ENV_PATH"
          echo "MEDIA=${{ secrets.MEDIA }}" >> "$ENV_PATH"
          echo "PGID=${{ secrets.PGID }}" >> "$ENV_PATH"
          echo "PUID=${{ secrets.PUID }}" >> "$ENV_PATH"
          echo "TZ=${{ secrets.TZ }}" >> "$ENV_PATH"

          # Pi-hole stack env
          mkdir -p /srv/homelab/stacks/services
          PIHOLE_ENV="/srv/homelab/stacks/services/stack.env"
          echo "PIHOLE_WEBPASSWORD=${{ secrets.PIHOLE_WEBPASSWORD }}" > "$PIHOLE_ENV"

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          /usr/local/bin/homelab/deploy.sh