name: Deploy homelab

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Sync repo to origin/main
        shell: bash
        run: |
          set -euo pipefail
          cd /srv/homelab
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Generate .env from compose variables
        shell: bash
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          set -euo pipefail
          umask 077

          cd /srv/homelab

          GLOBAL_ENV="/srv/homelab/.env"
          : > "$GLOBAL_ENV"

          # Find compose files
          mapfile -t compose_files < <(
            find /srv/homelab/stacks -type f \
              \( -name "docker-compose.yml" -o -name "compose.yml" \)
          )

          # Extract ${VAR} references
          mapfile -t vars < <(
            grep -rhoE '\$\{[A-Za-z_][A-Za-z0-9_]*([:?-][^}]*)?\}' "${compose_files[@]}" \
            | sed -E 's/^\$\{([A-Za-z_][A-Za-z0-9_]*).*$/\1/' \
            | sort -u
          )

          echo "Found variables:"
          printf ' - %s\n' "${vars[@]}"

          # Look them up in secrets
          for v in "${vars[@]}"; do
            value="$(jq -r --arg k "$v" '.[$k] // empty' <<< "$ALL_SECRETS_JSON")"

            if [ -n "$value" ] && [ "$value" != "null" ]; then
              printf '%s=%s\n' "$v" "$value" >> "$GLOBAL_ENV"
            else
              echo "Skipping $v (not in GitHub secrets)"
            fi
          done

          echo ".env generated:"
          cat "$GLOBAL_ENV"

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          /usr/local/bin/homelab/deploy.sh