name: Deploy homelab

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Write env files from GitHub Secrets
        shell: bash
        run: |
          set -euo pipefail
          umask 077

          # Global env
          TMP_ENV="$(mktemp)"
          cat > "$TMP_ENV" <<EOF
DOCKER_ROOT=${{ secrets.DOCKER_ROOT }}
DOWNLOADS=${{ secrets.DOWNLOADS }}
MEDIA=${{ secrets.MEDIA }}
PGID=${{ secrets.PGID }}
PUID=${{ secrets.PUID }}
TZ=${{ secrets.TZ }}
EOF
          sed -i 's/\r$//' "$TMP_ENV"
          mv "$TMP_ENV" /srv/homelab/.env

          # Pi-hole env (stack-specific)
          mkdir -p /srv/homelab/stacks/pihole
          TMP_ENV="$(mktemp)"
          cat > "$TMP_ENV" <<EOF
PIHOLE_WEBPASSWORD=${{ secrets.PIHOLE_WEBPASSWORD }}
EOF
          sed -i 's/\r$//' "$TMP_ENV"
          mv "$TMP_ENV" /srv/homelab/stacks/pihole/stack.env

          # Plex env (optional)
          mkdir -p /srv/homelab/stacks/plex
          TMP_ENV="$(mktemp)"
          cat > "$TMP_ENV" <<EOF
PLEX_TOKEN=${{ secrets.PLEX_TOKEN }}
EOF
          sed -i 's/\r$//' "$TMP_ENV"
          mv "$TMP_ENV" /srv/homelab/stacks/plex/stack.env

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          /srv/homelab/deploy.sh